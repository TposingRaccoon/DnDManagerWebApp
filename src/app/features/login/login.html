<form class="login-form" [formGroup]="fg" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="username">Username</label>
    <input
      id="username"
      type="text"
      formControlName="username"
      placeholder="Enter your username"
      class="form-control"
    />

    @if (fg.get('username')?.touched && fg.get('username')?.invalid) {
      <div class="error">
        Username is required.
      </div>
    }
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      placeholder="Enter your password"
      class="form-control"
    />

    @if (fg.get('password')?.touched && fg.get('password')?.invalid) {
      <div class="error">
        Password is required.
      </div>
    }
  </div>

  <button type="submit" [disabled]="fg.invalid">Login</button>
  <button type="button" (click)="register()">Register</button>
</form>
