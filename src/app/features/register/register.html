
<form class="login-form" [formGroup]="fg" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="username">Username</label>
    <input
      id="username"
      type="text"
      formControlName="Username"
      placeholder="Enter your username"
      class="form-control"
    />
    <div class="error" *ngIf="fg.get('Username')?.touched && fg.get('Username')?.invalid">
      Username is required.
    </div>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input
      id="password"
      type="password"
      formControlName="Password"
      placeholder="Enter your password"
      class="form-control"
    />
    <div class="error" *ngIf="fg.get('Password')?.touched && fg.get('Password')?.invalid">
      Password is required.
    </div>
  </div>

   <div class="form-group">
    <label for="password">Confirm Password</label>
    <input
      id="password"
      type="password"
      formControlName="Password2"
      placeholder="Enter your password"
      class="form-control"
    />
    <div class="error" *ngIf="fg.get('Password')?.touched && fg.get('Password')?.invalid">
      Password is required.
    </div>
  </div>

  <button type="submit" [disabled]="fg.invalid">Register</button>
  <button type="submit" (click)="logIn()">Log In</button>
</form>
